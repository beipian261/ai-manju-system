# ============================================================
# AI Comic Drama System — Nginx 反向代理配置
# 
# 功能：
#   - 安全响应头（CSP / HSTS / X-Frame-Options 等）
#   - Gzip 压缩
#   - 静态资源长期缓存
#   - WebSocket / SSE 代理支持
#   - 速率限制（防止暴力破解）
# ============================================================

upstream nextjs_upstream {
    server localhost:3000;
    keepalive 64;
}

# ── 全局速率限制区域（10 MB，约 16 万 IP）───────────
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

server {
    listen 80;
    server_name _;

    # ── Gzip 压缩 ──────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;
    gzip_disable "MSIE [1-6]\.";

    # ── 安全响应头 ──────────────────────────────────
    # 禁止 MIME 类型嗅探
    add_header X-Content-Type-Options "nosniff" always;

    # 禁止被嵌入 iframe（防点击劫持）
    add_header X-Frame-Options "DENY" always;

    # 启用浏览器 XSS 过滤器
    add_header X-XSS-Protection "1; mode=block" always;

    # 引荐来源策略
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 权限策略（限制浏览器 API 使用）
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # HSTS（仅 HTTPS 环境启用，HTTP 环境注释掉）
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Content Security Policy（允许 Agnes AI API 调用 + 内联样式用于 Next.js）
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://*.agnes-ai.com; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';" always;

    # ── 静态资源缓存 ──────────────────────────────
    # Next.js 构建产物（_next/static）→ 1 年缓存
    location /_next/static/ {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
    }

    # 其他静态资源（public/）→ 7 天缓存
    location /public/ {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;

        expires 7d;
        add_header Cache-Control "public";
        add_header Vary Accept-Encoding;
    }

    # 图标 / 清单 / robots → 1 天
    location ~* ^/(favicon\.ico|manifest\.json|robots\.txt)$ {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;

        expires 1d;
        add_header Cache-Control "public";
    }

    # ── 登录接口速率限制 ──────────────────────────
    location /api/auth/login {
        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # ── SSE 端点（禁用缓冲，保持长连接）───────────
    location /api/sse/ {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding on;
    }

    # ── 通用 API 代理 ─────────────────────────────
    location /api/ {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # ── 健康检查端点（无日志）────────────────────
    location = /api/auth/status {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        access_log off;
    }

    # ── 默认代理（页面请求）────────────────────────
    location / {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── 隐藏 Nginx 版本号 ──────────────────────────
    server_tokens off;

    # ── 请求体大小限制（防止大文件攻击）────────────
    client_max_body_size 10m;
    client_body_timeout 30s;
    client_header_timeout 10s;
}
