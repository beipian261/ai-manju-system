version: '3.8'

# ==============================
# Production Compose
# Prerequisites:
#   1. cp .env.example .env && fill in AGNES_API_KEY + AUTH_PASSWORD
#   2. docker compose -f docker-compose.yml up -d
# ==============================

services:
  app:
    build:
      context: .
      target: runner
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      # Persist SQLite database and uploads
      - app_data:/app/data
      - app_db:/app/prisma
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/auth/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  app_data:
    driver: local
  app_db:
    driver: local
